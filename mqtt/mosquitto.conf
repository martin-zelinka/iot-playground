# Mosquitto Configuration File for easycon
# This configuration is used for local development and testing

# Network settings
listener 1883
protocol mqtt
allow_anonymous true

# Persistence
persistence false

# Logging
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# Message size limits
message_size_limit 0

# Keepalive settings
max_keepalive 65535

# Connection limits
max_connections -1

# Security (for development - disable in production)
# For production, use:
# allow_anonymous false
# password_file /path/to/password_file
# acl_file /path/to/acl_file
# listener 8883
# certfile /path/to/server.crt
# keyfile /path/to/server.key
# cafile /path/to/ca.crt
