services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.api.yml
    container_name: django_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./iot_devices:/app/iot_devices
    env_file:
      - .env_docker
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - app_network

  devices:
    build:
      context: .
      dockerfile: Dockerfile.devices.yml
    container_name: iot_devices
    ports:
      - "1883:1883"
    volumes:
      - ./iot_devices:/app/iot_devices
    env_file:
      - .env_docker
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  db:
    image: postgres:17
    container_name: postgre_db
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - app_network

  mongo:
    image: mongo:8
    container_name: mongo_db
    volumes:
      - ./mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DB}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${MONGODB_PORT}:27017"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge